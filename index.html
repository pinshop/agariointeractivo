<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TikTok Battle - Agario Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.4.1/socket.io.min.js"
        crossorigin="anonymous"></script>
    <script src="connection.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            max-width: 100vw;
            width: 100vw;
        }

        .inputFields {
            padding: 10px;
            background: rgba(20, 20, 20, 0.9);
            border-bottom: 2px solid #333;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .inputFields input[type="text"] {
            padding: 6px 12px;
            font-size: 0.9em;
            border-radius: 15px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            outline: none;
            min-width: 120px;
            max-width: 200px;
        }

        .inputFields input[type="button"] {
            padding: 6px 16px;
            font-size: 0.9em;
            border-radius: 15px;
            border: none;
            background: #fe2c55;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .inputFields input[type="button"]:hover {
            background: #e02045;
        }

        #stateText {
            margin-left: 10px;
            font-weight: bold;
            color: #aaa;
            font-size: 0.9em;
            white-space: nowrap;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            max-width: 100vw;
            width: 100vw;
        }


        #game-info-board {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #FFD700;
            border-radius: 12px;
            padding: 10px 25px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            display: none;
            user-select: none;
            pointer-events: auto;
            cursor: move;
        }

        #game-info-board.active {
            display: block;
        }

        #time-display {
            color: #FFD700;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            font-family: monospace;
            margin-bottom: 5px;
        }

        #players-display {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        #timerButton {
            background: #ff9800 !important;
        }

        #timerButton:hover {
            background: #e68a00 !important;
        }

        /* --------------------------
           NEW: Top Killers Board 
           -------------------------- */
        #killers-board {
            position: absolute;
            top: 150px;
            right: 20px;
            width: 175px; /* Reducido al 70% de 250px */
            min-height: 105px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #FF3333;
            border-radius: 6px;
            padding: 7px;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 100;
            resize: both;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
            cursor: move;
        }

        #killers-board .board-header {
            font-weight: bold;
            font-size: 13px; /* Reducido de 18px */
            text-align: center;
            border-bottom: 1px solid #555;
            padding-bottom: 3px;
            margin-bottom: 7px;
            color: #FF3333;
        }

        #killers-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .killer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 8px;
            border-radius: 5px;
        }

        .killer-row img {
            width: 17px; /* Reducido de 24px */
            height: 17px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 7px;
        }

        .killer-info {
            display: flex;
            align-items: center;
            flex-grow: 1;
            font-size: 11px; /* Letra más pequeña */
        }

        .killer-score {
            font-weight: bold;
            color: #FFD700;
            font-size: 11px;
        }

        /* --------------------------
           NEW: Podium Overlay
           -------------------------- */
        #podium-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }

        .podium-title {
            font-size: 60px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 10px;
        }

        .podium-subtitle {
            font-size: 30px;
            color: #FFF;
            margin-bottom: 40px;
        }

        #podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 30px;
            height: 300px;
        }

        .podium-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
        }

        .podium-player img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #FFF;
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .podium-rank-box {
            width: 100%;
            background: linear-gradient(to top, #333, #555);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .rank-1 .podium-rank-box {
            height: 200px;
            background: linear-gradient(to top, #b8860b, #ffd700);
            color: #000;
        }

        .rank-1 img {
            border-color: #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }

        .rank-2 .podium-rank-box {
            height: 150px;
            background: linear-gradient(to top, #777, #c0c0c0);
            color: #000;
        }

        .rank-2 img {
            border-color: #c0c0c0;
            box-shadow: 0 0 20px #c0c0c0;
        }

        .rank-3 .podium-rank-box {
            height: 100px;
            background: linear-gradient(to top, #8b4513, #cd7f32);
            color: #fff;
        }

        .rank-3 img {
            border-color: #cd7f32;
            box-shadow: 0 0 20px #cd7f32;
        }

        .rank-4 .podium-rank-box,
        .rank-5 .podium-rank-box {
            height: 50px;
            font-size: 25px;
        }

        .podium-name {
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            margin-top: -30px;
            /* pull name up */
            text-shadow: 1px 1px 3px black;
            z-index: 10;
        }

        .podium-score {
            font-size: 16px;
            color: #FFD700;
            text-shadow: 1px 1px 3px black;
            z-index: 10;
        }

        /* --------------------------
           NEW: Join Notifications
           -------------------------- */
        #join-notifications {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            z-index: 200;
            pointer-events: none;
            /* Let clicks pass through if needed */
        }

        @keyframes fadeUpOut {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            15% {
                opacity: 1;
                transform: translateY(0);
            }

            85% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .join-toast {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #FFD700;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            animation: fadeUpOut 2s forwards;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="inputFields">
        <span>TikTok Live:</span>
        <input type="text" id="uniqueIdInput" placeholder="@username">
        <input type="button" id="connectButton" value="Conectar">
        <select id="timerMinutes"
            style="padding: 6px; border-radius: 15px; border: 1px solid #444; background: #222; color: #fff; outline: none; font-size: 0.9em; cursor: pointer;">
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
            <option value="20">20 min</option>
            <option value="30">30 min</option>
        </select>
        <input type="button" id="timerButton" value="Activar Contador">
        <span id="stateText">Desconectado</span>
    </div>

    <div id="game-info-board">
        <div id="time-display">00:00</div>
        <div id="players-display">Jugadores: <span id="players-count">0</span></div>
    </div>

    <div id="join-notifications">
        <!-- New join toasts will go here -->
    </div>

    <!-- NEW: Top Killers Board -->
    <div id="killers-board" class="draggable-board">
        <div class="board-header">Top 5 Killers</div>
        <div id="killers-list">
            <!-- Rellenado por JS -->
        </div>
    </div>

    <!-- NEW: Podium Overlay (Hidden by default) -->
    <div id="podium-overlay">
        <div class="podium-title">¡TIEMPO AGOTADO!</div>
        <div class="podium-subtitle">TOP 5 PAÍSES </div>
        <div id="podium-container">
            <!-- Rellenado por JS -->
        </div>
    </div>

    <canvas id="game"></canvas>

    <script>
       let connection = new TikTokIOConnection("https://server-8a5o.onrender.com/");

        

        // SONIDOS
        const spawnSound = new Audio("aparecer.mp3");
        const followSound = new Audio("seguir.mp3");
        const likeSound = new Audio("tap.mp3");
        const damageGlobalSound = new Audio("rose.mp3");
        const healMassiveSound = new Audio("crecer.mp3");
        const auraSound = new Audio("aura.mp3");
        const wipeoutSound = new Audio("wipeout.mp3");
        const laserSound = new Audio("laser.mp3");
        const extremeLifeSound = new Audio("10000.mp3");
        const deadSound = new Audio("dead.mp3");
        const boingSound = new Audio("boing.mp3");
        const fuerzaSound = new Audio("fuerza.mp3");
        const balaSound = new Audio("bala.mp3");
        const imanSound = new Audio("iman.mp3");
        const siuSound = new Audio("siu.mp3");
        const spikeSound = new Audio("spike.mp3"); // Nuevo sonido de espinas ROSA
        const galaxySound = new Audio("galaxy.mp3");

        $("#connectButton").click(connect);
        $("#uniqueIdInput").on("keyup", e => { if (e.key === "Enter") connect(); });

        function connect() {
            let username = $("#uniqueIdInput").val().trim();
            if (!username) { alert("Escribe un usuario"); return; }
            $("#stateText").text("Conectando...");
            connection.connect(username)
                .then(state => {
                    $("#stateText").text(`Conectado a roomId ${state.roomId}`).css("color", "#25f4ee");
                    balls = [];
                    particles = [];
                    texts = [];
                    bombs = [];
                    lasers = [];
                    initCountries();
                })
                .catch(err => $("#stateText").text("Error: " + err).css("color", "red"));
        }

        /* ========== AGARIO GAME ENGINE ========== */
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // --- SISTEMA DE PARTÍCULAS ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 3;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.life -= this.decay;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }
        let particles = [];

        // --- TEXTOS FLOTANTES ---
        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.life = 1.0;
                this.vy = -1.5;
            }
            update() {
                this.y += this.vy;
                this.life -= 0.015;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.font = "bold 28px Arial";
                ctx.fillStyle = this.color;
                ctx.shadowColor = "black";
                ctx.shadowBlur = 4;
                ctx.strokeStyle = "rgba(0,0,0,0.5)";
                ctx.lineWidth = 3;
                ctx.strokeText(this.text, this.x, this.y);
                ctx.fillText(this.text, this.x, this.y);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }
        }
        let texts = [];

        // --- RAYO LÁSER (ID 5487) ---
        class Laser {
            constructor(x, y, angle, ownerId) {
                this.ownerId = ownerId;
                this.segments = [];
                this.life = 1.0; // Duración visual (alpha)
                this.damagedIds = new Set(); // Para no dañar al mismo objetivo múltiples veces en un frame

                // Calcular trayectoria instantánea completa (con 1 rebote)
                this.calculatePath(x, y, angle);
            }

            calculatePath(startX, startY, angle) {
                let currentX = startX;
                let currentY = startY;
                let currentAngle = angle;

                // Máximo 2 segmentos (Original + 1 Rebote)
                for (let i = 0; i < 2; i++) {
                    let dirX = Math.cos(currentAngle);
                    let dirY = Math.sin(currentAngle);

                    // Encontrar intersección con paredes
                    // Paredes: x=0, x=W, y=0, y=H
                    let tMin = Infinity;
                    let hitWall = null; // 'left', 'right', 'top', 'bottom'

                    // Wall Left (x=0)
                    if (dirX < 0) {
                        let t = (0 - currentX) / dirX;
                        if (t < tMin) { tMin = t; hitWall = 'vert'; }
                    }
                    // Wall Right
                    if (dirX > 0) {
                        let t = (canvas.width - currentX) / dirX;
                        if (t < tMin) { tMin = t; hitWall = 'vert'; }
                    }
                    // Wall Top
                    if (dirY < 0) {
                        let t = (0 - currentY) / dirY;
                        if (t < tMin) { tMin = t; hitWall = 'horz'; }
                    }
                    // Wall Bottom
                    if (dirY > 0) {
                        let t = (canvas.height - currentY) / dirY;
                        if (t < tMin) { tMin = t; hitWall = 'horz'; }
                    }

                    let endX = currentX + dirX * tMin;
                    let endY = currentY + dirY * tMin;

                    this.segments.push({
                        x1: currentX, y1: currentY,
                        x2: endX, y2: endY
                    });

                    // Aplicar Daño en este segmento
                    this.checkCollisions(currentX, currentY, endX, endY);

                    // Preparar siguiente rebote
                    currentX = endX;
                    currentY = endY;

                    if (hitWall === 'vert') {
                        dirX *= -1;
                        currentAngle = Math.atan2(dirY, dirX);
                    } else if (hitWall === 'horz') {
                        dirY *= -1;
                        currentAngle = Math.atan2(dirY, dirX);
                    }
                }
            }

            checkCollisions(x1, y1, x2, y2) {
                balls.forEach(b => {
                    // Evitar auto-daño o múltiples hits
                    if (this.damagedIds.has(b.uniqueId)) return;

                    // Distancia punto-segmento
                    // https://stackoverflow.com/a/6853926
                    let A = x1 - b.x;
                    let B = y1 - b.y;
                    let C = x2 - x1;
                    let D = y2 - y1;

                    let dot = A * C + B * D;
                    let len_sq = C * C + D * D;
                    let param = -1;
                    if (len_sq != 0) // in case of 0 length line
                        param = -dot / len_sq;

                    let xx, yy;

                    if (param < 0) {
                        xx = x1; yy = y1;
                    } else if (param > 1) {
                        xx = x2; yy = y2;
                    } else {
                        xx = x1 + param * C;
                        yy = y1 + param * D;
                    }

                    let dx = b.x - xx;
                    let dy = b.y - yy;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < b.radius) {
                        // Evitar auto-daño
                        if (b.uniqueId === this.ownerId) return;

                        // Si el objetivo tiene escudo, no recibe daño del láser
                        if (b.hasShield) return;

                        b.life -= 30;
                        b.lastAttackerId = this.ownerId; // Registrar Killer
                        texts.push(new FloatingText(b.x, b.y - b.radius, "-30", "#FF00FF"));
                        this.damagedIds.add(b.uniqueId);

                        // Efecto de impacto
                        for (let i = 0; i < 5; i++) particles.push(new Particle(xx, yy, "#00FFFF"));
                    }
                });
            }

            update() {
                this.life -= 0.0025; // Más lento, dura 400 frames lógicos
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.lineWidth = 10 * this.life;
                ctx.lineCap = "round";
                ctx.strokeStyle = "#00FFFF";
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#00FFFF";

                ctx.beginPath();
                this.segments.forEach(seg => {
                    ctx.moveTo(seg.x1, seg.y1);
                    ctx.lineTo(seg.x2, seg.y2);
                });
                ctx.stroke();

                // Core blanco más fino
                ctx.lineWidth = 4 * this.life;
                ctx.strokeStyle = "#FFFFFF";
                ctx.stroke();

                ctx.restore();
            }
        }
        let lasers = [];

        // --- JUGADORES (ESFERAS) ---
        let balls = [];
        let totalDeathCount = 0; // Contador total de muertes acumulado
        const BASE_RADIUS = 30; // Tamaño base para 100 de vida (o menos)

        const countries = [
            { id: "México", flag: "https://flagcdn.com/w160/mx.png", aliases: ["mexico", "mex"] },
            { id: "Estados Unidos", flag: "https://flagcdn.com/w160/us.png", aliases: ["estados unidos", "usa", "eeuu", "ee.uu"] },
            { id: "Colombia", flag: "https://flagcdn.com/w160/co.png", aliases: ["colombia", "col"] },
            { id: "España", flag: "https://flagcdn.com/w160/es.png", aliases: ["españa", "espana", "esp"] },
            { id: "Argentina", flag: "https://flagcdn.com/w160/ar.png", aliases: ["argentina", "arg"] },
            { id: "Perú", flag: "https://flagcdn.com/w160/pe.png", aliases: ["peru", "perú", "per"] },
            { id: "Venezuela", flag: "https://flagcdn.com/w160/ve.png", aliases: ["venezuela", "ven"] },
            { id: "Chile", flag: "https://flagcdn.com/w160/cl.png", aliases: ["chile", "chi"] },
            { id: "Guatemala", flag: "https://flagcdn.com/w160/gt.png", aliases: ["guatemala", "gua"] },
            { id: "Ecuador", flag: "https://flagcdn.com/w160/ec.png", aliases: ["ecuador", "ecu"] },
            { id: "Bolivia", flag: "https://flagcdn.com/w160/bo.png", aliases: ["bolivia", "bol"] },
            { id: "Cuba", flag: "https://flagcdn.com/w160/cu.png", aliases: ["cuba", "cub"] },
            { id: "República Dominicana", flag: "https://flagcdn.com/w160/do.png", aliases: ["republica dominicana", "república dominicana", "rd", "dominicana"] },
            { id: "Honduras", flag: "https://flagcdn.com/w160/hn.png", aliases: ["honduras", "hon"] },
            { id: "Paraguay", flag: "https://flagcdn.com/w160/py.png", aliases: ["paraguay", "par"] },
            { id: "El Salvador", flag: "https://flagcdn.com/w160/sv.png", aliases: ["el salvador", "salvador"] },
            { id: "Nicaragua", flag: "https://flagcdn.com/w160/ni.png", aliases: ["nicaragua", "nic"] },
            { id: "Costa Rica", flag: "https://flagcdn.com/w160/cr.png", aliases: ["costa rica", "cr"] },
            { id: "Panamá", flag: "https://flagcdn.com/w160/pa.png", aliases: ["panama", "panamá", "pan"] },
            { id: "Uruguay", flag: "https://flagcdn.com/w160/uy.png", aliases: ["uruguay", "uru"] }
        ];

        function initCountries() {
            balls = [];
            globalPlayerStats = {};

            // Iniciar solo 5 paises aleatorios
            let shuffled = [...countries].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, 5);

            selected.forEach(c => {
                let ball = new Ball(c.id, c.flag);
                ball.life = 100;
                balls.push(ball);
            });

            // Registrar a todos en global stats para no perderlos si se unen luego
            countries.forEach(c => {
                globalPlayerStats[c.id] = {
                    kills: 0,
                    flag: c.flag,
                    name: c.id
                };
            });
        }

        // No hay MAX_RADIUS fijo, escala hasta 1000 vida

        class Ball {
            constructor(uniqueId, avatarUrl) {
                this.uniqueId = uniqueId;
                this.life = 100;
                this.radius = BASE_RADIUS;
                this.targetRadius = BASE_RADIUS;

                this.lastDamageTime = 0;

                let cx = window.innerWidth / 2;
                let cy = (window.innerHeight + 70) / 2;
                let radiusX = (window.innerWidth / 2) - 50;
                let radiusY = Math.min((window.innerHeight - 70) / 2 - 50, radiusX * 0.7);
                radiusX = Math.max(radiusX, 150);
                radiusY = Math.max(radiusY, 100);

                let randomAngle = Math.random() * Math.PI * 2;
                let randomDist = Math.random() * 0.8; // Ratio del 0 al 0.8

                this.x = cx + Math.cos(randomAngle) * (radiusX * randomDist);
                this.y = cy + Math.sin(randomAngle) * (radiusY * randomDist);

                // Masa proporcional a radio^2
                this.mass = this.radius * this.radius;

                let angle = Math.random() * Math.PI * 2;
                let speed = 2 + Math.random() * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.img = new Image();
                this.img.src = avatarUrl || `https://p16-sign-va.tiktokcdn.com/tos-maliva-avt-0068/7d23fcw8d0e0a0d4_100x100.jpeg?x-expires=1688500000&x-signature=random`;
                this.imgLoaded = false;
                this.img.onload = () => { this.imgLoaded = true; };

                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.isGlow = false;
                this.glowTimer = 0;

                // Bonus Props
                this.likeCount = 0;
                this.hasGoldenAura = false;
                this.goldenAuraEndTime = 0;

                // Stats
                this.spawnTime = Date.now();
                this.kills = 0;
                this.lastAttackerId = null;

                // Propiedades de poder aumentado
                this.isPowered = false;
                this.powerEndTime = 0;
                this.damageMultiplier = 1;

                // Propiedades de imán
                this.isMagnetized = false;
                this.magnetOwner = null;
                this.magnetEndTime = 0;
                this.originalVx = 0;
                this.originalVy = 0;

                // Propiedades de velocidad y congelación
                this.isSpeedBoosted = false;
                this.speedEndTime = 0;
                this.isFrozen = false;
                this.freezeEndTime = 0;
                this.freezeDamageTimer = 0;

                // Propiedades de Espinas (Spikes)
                this.spikeCount = 0;
                this.spikesEndTime = 0;
                this.spikeAngle = 0;
                this.spikeType = "normal";

                // Propiedades de Escudo
                this.hasShield = false;
                this.shieldEndTime = 0;
                this.shieldAnimationTime = 0;

                // Propiedades Visuales Extra
                this.damageFlashTimer = 0;
            }

            // Calcular radio objetivo basado en vida
            updateRadius() {
                // Vida 100 -> Escala 1.0 (BASE_RADIUS = 30)
                // Vida 1000 -> Escala 10.0 (300px)

                // Cap de tamaño visual = 3 veces el radio inicial
                // BASE_RADIUS = 30 -> Max 90
                // Vida 300 -> Escala 3.0
                let visualLife = Math.min(this.life, 300);
                visualLife = Math.max(10, visualLife);

                let scale = visualLife / 100; // 0.1 a 3.0

                if (visualLife < 100) scale = 0.5 + (visualLife / 200);

                let calculatedRadius = BASE_RADIUS * scale;

                // Limite absoluto visual (Doble del tamaño original máx)
                this.targetRadius = Math.min(calculatedRadius, BASE_RADIUS * 2);
            }

            takeDamage(amount = 1) {
                // If shield is active, do not take damage
                if (this.hasShield) return;

                if (Date.now() - this.lastDamageTime > 50) {
                    this.life -= amount;
                    this.lastDamageTime = Date.now();
                    this.damageFlashTimer = Date.now() + 150; // Parpadeo rojo agresivo de 150ms al recibir daño continuo
                }
            }

            forceDamage(amount) {
                // If shield is active, do not take damage even if forced
                if (this.hasShield) return;

                // Daño forzado (bombas, scripts) sí afecta, o podemos hacerlo inmune también?
                // Generalmente power-up es para choques, pero dejemos que fuerza mayor sí dañe.
                this.life -= amount;
                this.damageFlashTimer = Date.now() + 150;
                texts.push(new FloatingText(this.x, this.y - this.radius, `-${amount}`, "#FF3333"));
            }

            heal(amount) {
                this.life += amount;
                this.isGlow = true;
                this.glowTimer = 20;
                texts.push(new FloatingText(this.x, this.y - this.radius, `+${amount}`, "#33FF33"));
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // EFECTOS VISUALES
                if (this.hasShield) {
                    // ESCUDO AZUL ANIMADO
                    let pulse = (Math.sin(this.shieldAnimationTime) + 1) / 2;
                    let shieldColor = pulse > 0.5 ? "#00AAFF" : "#0088FF"; // Cambia entre azul y celeste

                    ctx.strokeStyle = shieldColor;
                    ctx.lineWidth = 8 + pulse * 4;
                    ctx.shadowBlur = 30 + pulse * 20;
                    ctx.shadowColor = shieldColor;

                    // Dibujar círculo del escudo
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 15, 0, Math.PI * 2);
                    ctx.stroke();

                    // Segundo círculo más pequeño para efecto de profundidad
                    ctx.lineWidth = 4 + pulse * 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (this.hasGoldenAura) {
                    // AURA DORADA INFINITA
                    let pulse = (Math.sin(Date.now() / 200) + 1) / 2;
                    let glowSize = 20 + pulse * 20;
                    let glowAlpha = 0.5 + pulse * 0.5;

                    ctx.shadowBlur = glowSize;
                    ctx.shadowColor = `rgba(255, 215, 0, ${glowAlpha})`;

                    let r = 255;
                    let g = 215 + (40 * pulse);
                    let b = 0 + (100 * pulse);
                    ctx.strokeStyle = `rgb(${r},${g},${b})`;
                    ctx.lineWidth = 6 + pulse * 2;
                } else if (this.isGlow) {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = "gold";
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 4;
                } else {
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 4;
                }

                // Borde y Fondo Base
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);

                // Si el daño fue reciente (flash rojo)
                if (Date.now() < this.damageFlashTimer) {
                    ctx.fillStyle = "#FF0000";
                } else {
                    ctx.fillStyle = this.color;
                }

                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Dibujar Espinas (Spikes) si están activas
                if (this.spikeCount > 0) {
                    ctx.save();
                    ctx.rotate(this.spikeAngle);
                    // Animación de extensión/retracción de las espinas usando el tiempo actual
                    let spikeLength = 15 + Math.sin(Date.now() / 150) * 8;

                    if (this.spikeType === "fire") {
                        ctx.fillStyle = (Math.floor(Date.now() / 100) % 2 === 0) ? "#FF8C00" : "#FFD700";
                        ctx.strokeStyle = "#FF4500";
                    } else if (this.spikeType === "rosa") {
                        ctx.fillStyle = "#FF1493";
                        ctx.strokeStyle = "#C71585";
                    } else {
                        ctx.fillStyle = "#FF0000";
                        ctx.strokeStyle = "#8B0000";
                    }

                    ctx.lineWidth = 2;
                    ctx.lineJoin = "round";
                    for (let i = 0; i < this.spikeCount; i++) {
                        let angle = (i * 2 * Math.PI) / this.spikeCount;
                        ctx.save();
                        ctx.rotate(angle);
                        ctx.beginPath();
                        ctx.moveTo(this.radius, -5); // base top
                        ctx.lineTo(this.radius + spikeLength, 0); // punta
                        ctx.lineTo(this.radius, 5); // base bottom
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                    }
                    ctx.restore();
                }

                // Avatar
                if (this.imgLoaded) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius - 2, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(this.img, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                    ctx.restore();
                }

                // Color de Vida
                let lifeColor = "#00FF00";
                if (this.life < 50) lifeColor = "#FFFF00";
                if (this.life < 30) lifeColor = "#FF0000";

                // CONTADOR DE VIDA
                // Si es max size (>= 300 radio o >1000 vida), fuente 20% más grande (16px * 1.2 = ~19px -> 20px)
                let fontSize = this.radius >= 299 ? "20px" : "16px";
                ctx.font = `bold ${fontSize} Arial`;

                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                ctx.shadowColor = "black";
                ctx.shadowBlur = 4;
                ctx.lineWidth = 3;
                ctx.strokeStyle = "rgba(0,0,0,0.8)";
                ctx.strokeText(this.life, 0, -8);

                ctx.fillStyle = lifeColor;
                ctx.shadowBlur = 0;
                ctx.fillText(this.life, 0, -8);

                // Nombre Adentro
                let nameFontSize = this.radius >= 299 ? "16px" : "12px";
                ctx.font = `bold ${nameFontSize} Arial`;
                ctx.fillStyle = "white";
                ctx.strokeText(this.uniqueId, 0, 10);
                ctx.fillText(this.uniqueId, 0, 10);

                ctx.restore();

                // Dibujar corona si es el jugador con más vida
                let highestLifePlayer = getPlayerWithHighestLife();
                if (highestLifePlayer && this.uniqueId === highestLifePlayer.uniqueId) {
                    // Dibujar corona arriba de la esfera
                    ctx.save();
                    ctx.font = "bold 24px Arial";
                    ctx.fillStyle = "#FFD700";
                    ctx.strokeStyle = "#FFA500";
                    ctx.lineWidth = 2;
                    ctx.shadowColor = "rgba(255, 215, 0, 0.8)";
                    ctx.shadowBlur = 8;

                    // Posición de la corona (arriba de la esfera)
                    let crownY = this.y - this.radius - 20;

                    // Dibujar corona usando emoji o texto
                    ctx.strokeText("👑", this.x, crownY);
                    ctx.fillText("👑", this.x, crownY);
                    ctx.restore();
                }
            }

            update() {
                // Actualizar tamaño objetivo según vida
                this.updateRadius();

                // INTERPOLACIÓN SUAVE (Lerp) para evitar "titileo"
                // Se mueve un 10% de la diferencia cada frame
                if (Math.abs(this.radius - this.targetRadius) > 0.1) {
                    this.radius += (this.targetRadius - this.radius) * 0.1;
                    this.mass = this.radius * this.radius;
                } else {
                    this.radius = this.targetRadius;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Paredes - ELIPSE DE NEÓN (Más ancho que alto)
                let cx = canvas.width / 2;
                let cy = (canvas.height + 70) / 2;
                
                let radiusX = (canvas.width / 2) - 20;
                let radiusY = Math.min((canvas.height - 70) / 2 - 20, radiusX * 0.7); // Altura contenida
                radiusX = Math.max(radiusX, 150);
                radiusY = Math.max(radiusY, 100);

                let dx = this.x - cx;
                let dy = this.y - cy;
                
                // Distancia elíptica normalizada: (x^2/a^2) + (y^2/b^2)
                let normRadius = Math.sqrt((dx * dx) / (radiusX * radiusX) + (dy * dy) / (radiusY * radiusY));

                let hitWall = false;

                if (normRadius > 1.0) {
                    // Normal de la elipse en el punto de contacto: (2x/a^2, 2y/b^2)
                    let nx = (dx / (radiusX * radiusX));
                    let ny = (dy / (radiusY * radiusY));
                    let len = Math.sqrt(nx * nx + ny * ny);
                    nx /= len;
                    ny /= len;

                    // Ajustar posición para quedar adentro (aproximado)
                    this.x = cx + (dx / normRadius);
                    this.y = cy + (dy / normRadius);

                    // Reflejar velocidad sobre la normal
                    let dot = this.vx * nx + this.vy * ny;
                    this.vx = this.vx - 2 * dot * nx;
                    this.vy = this.vy - 2 * dot * ny;

                    hitWall = true;
                }

                if (hitWall) {
                    boingSound.cloneNode(true).play().catch(e => console.log(e));
                    
                    // Chispas tipo sierra al chocar contra la orilla
                    let colX = this.x;
                    let colY = this.y;
                    for (let k = 0; k < 4; k++) { // Menos chispas
                        let p = new Particle(colX, colY, "#00FFFF"); // Azul Neón
                        p.vx += this.vx * 0.5 + (Math.random() - 0.5) * 4;
                        p.vy += this.vy * 0.5 + (Math.random() - 0.5) * 4;
                        particles.push(p);
                    }
                }

                if (this.isGlow) {
                    this.glowTimer--;
                    if (this.glowTimer <= 0) this.isGlow = false;
                }

                // Verificar si el poder aumentado ha expirado
                if (this.isPowered && Date.now() > this.powerEndTime) {
                    this.isPowered = false;
                    this.damageMultiplier = 1;
                }

                // Verificar si el imán ha expirado
                if (this.isMagnetized && Date.now() > this.magnetEndTime) {
                    this.isMagnetized = false;
                    this.magnetOwner = null;
                    this.magnetDamageTimer = 0;
                    this.vx = this.originalVx;
                    this.vy = this.originalVy;
                }

                // Verificar si la velocidad aumentada ha expirado
                if (this.isSpeedBoosted && Date.now() > this.speedEndTime) {
                    this.isSpeedBoosted = false;
                }

                // Verificar si la congelación ha expirado
                if (this.isFrozen && Date.now() > this.freezeEndTime) {
                    this.isFrozen = false;
                    this.freezeDamageTimer = 0;
                }

                // Verificar si el escudo ha expirado
                if (this.hasShield && Date.now() > this.shieldEndTime) {
                    this.hasShield = false;
                    this.shieldEndTime = 0;
                    this.shieldAnimationTime = 0;
                }

                // Verificar si el aura dorada ha expirado
                if (this.hasGoldenAura && Date.now() > this.goldenAuraEndTime) {
                    this.hasGoldenAura = false;
                    this.goldenAuraEndTime = 0;
                }

                // Actualizar animación del escudo
                if (this.hasShield) {
                    this.shieldAnimationTime += 0.05;
                }

                // Verificar y actualizar rotación de espinas (AHORA SON PERMANENTES)
                if (this.spikeCount > 0) {
                    // Rotar para efecto de motosierra continua
                    this.spikeAngle += 0.05;
                }
            }
        }

        function getPlayerWithHighestLife() {
            if (balls.length === 0) return null;
            return balls.reduce((prev, current) => (prev.life > current.life) ? prev : current);
        }

        // ... (rest of the code remains the same)
        function resolveCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];

                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let minDist = b1.radius + b2.radius;

                    if (distance < minDist) {
                        // Sonido de colisión física (rebote normal) ELIMINADO: boingSound.cloneNode(true).play()

                        // 💥 EFECTO CHISPAS (BEYBLADE TRAIL SUTIL) AL CHOCAR 💥
                        let colX = b1.x + (dx / distance) * b1.radius;
                        let colY = b1.y + (dy / distance) * b1.radius;

                        // Efecto sierra trompo giratorio - Menos chispas, puramente Azul Neón
                        for (let k = 0; k < 4; k++) {
                            let p1 = new Particle(colX, colY, "#00FFFF"); // Azul Neón Fuerte
                            
                            // Disparamos partículas perpelinduculares a la colisión para efecto "sierra" tangencial
                            let tangentX = -dy / distance;
                            let tangentY = dx / distance;
                            let dir = (Math.random() > 0.5 ? 1 : -1);
                            p1.vx = tangentX * dir * (Math.random() * 5 + 2) + b1.vx * 0.5; 
                            p1.vy = tangentY * dir * (Math.random() * 5 + 2) + b1.vy * 0.5;
                            particles.push(p1);
                            
                            if (Math.random() < 0.3) {
                                let p2 = new Particle(colX, colY, "#00BFFF"); // Celeste más oscuro
                                p2.vx = tangentX * dir * (Math.random() * 5 + 3) + b1.vx * 0.5;
                                p2.vy = tangentY * dir * (Math.random() * 5 + 3) + b1.vy * 0.5;
                                particles.push(p2);
                            }
                        }

                        // Aplicar daño SOLO si hay espinas involucradas
                        // Tomamos un margen ligeramente mayor para verificar daño de espinas (15px de espina)
                        let spikeArea1 = minDist + (b1.spikeCount > 0 ? 15 : 0);
                        let spikeArea2 = minDist + (b2.spikeCount > 0 ? 15 : 0);

                        // Si B1 tiene espinas y alcanza a tocar a B2
                        if (distance <= spikeArea1 && b1.spikeCount > 0) {
                            let dmg = b1.spikeType === "fire" ? 20 : 2;
                            b2.takeDamage(dmg);
                            b2.lastAttackerId = b1.uniqueId;
                        }

                        // Si B2 tiene espinas y alcanza a tocar a B1
                        if (distance <= spikeArea2 && b2.spikeCount > 0) {
                            let dmg = b2.spikeType === "fire" ? 20 : 2;
                            b1.takeDamage(dmg);
                            b1.lastAttackerId = b2.uniqueId;
                        }

                        // Si uno tiene boost, empuja con más fuerza (masa efectiva mayor para el calculo?)
                        // O simplemente la velocidad alta ya hace el trabajo.
                        // Physics normal de rebote:

                        let nx = dx / distance;
                        let ny = dy / distance;

                        let overlap = minDist - distance;
                        let totalMass = b1.mass + b2.mass;
                        let r1 = b2.mass / totalMass;
                        let r2 = b1.mass / totalMass;

                        b1.x -= nx * overlap * r1;
                        b1.y -= ny * overlap * r1;
                        b2.x += nx * overlap * r2;
                        b2.y += ny * overlap * r2;

                        let k = -2 * ((b2.vx - b1.vx) * nx + (b2.vy - b1.vy) * ny) / (1 / b1.mass + 1 / b2.mass);

                        b1.vx -= k * (1 / b1.mass) * nx;
                        b1.vy -= k * (1 / b1.mass) * ny;
                        b2.vx += k * (1 / b2.mass) * nx;
                        b2.vy += k * (1 / b2.mass) * ny;
                    }
                }
            }
        }

        /* ========== LOOP PRINCIPAL ========== */
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Fondo oscuro base para contraste
            ctx.fillStyle = "rgba(10, 10, 15, 1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ELIPSE NEÓN (Área de Juego más ancha que alta)
            let cx = canvas.width / 2;
            let cy = (canvas.height + 70) / 2;
            let radiusX = (canvas.width / 2) - 20;
            let radiusY = Math.min((canvas.height - 70) / 2 - 20, radiusX * 0.7); // 70% del ancho máximo de alto
            radiusX = Math.max(radiusX, 150);
            radiusY = Math.max(radiusY, 100);

            ctx.save();
            ctx.beginPath();
            ctx.ellipse(cx, cy, radiusX, radiusY, 0, 0, Math.PI * 2);
            // Sombra Neon
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#00FFFF";
            ctx.strokeStyle = "#00FFFF";
            ctx.lineWidth = 6;
            ctx.stroke();

            // Centro blanco resaltado
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Fondo interior tenuemente azulado
            ctx.fillStyle = "rgba(0, 255, 255, 0.05)";
            ctx.fill();
            ctx.restore();

            // Actualizar Bolas y Textos
            balls.forEach(b => b.update());

            // Aplicar atracción magnética
            balls.forEach(ball => {
                if (ball.isMagnetized && ball.magnetOwner) {
                    let owner = balls.find(b => b.uniqueId === ball.magnetOwner);
                    if (owner) {
                        // Calcular dirección hacia el owner
                        let dx = owner.x - ball.x;
                        let dy = owner.y - ball.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance > 0) {
                            // Fuerza de atracción (más fuerte cuando está cerca)
                            let force = Math.min(8, 200 / distance);
                            let nx = (dx / distance) * force;
                            let ny = (dy / distance) * force;

                            // Aplicar velocidad hacia el owner
                            ball.vx = nx;
                            ball.vy = ny;
                        }
                    }

                    // Aplicar 5 daño cada segundo (Total 50 en 10s)
                    if (Date.now() - ball.magnetDamageTimer >= 1000) {
                        ball.takeDamage(5);
                        ball.magnetDamageTimer = Date.now();
                        texts.push(new FloatingText(ball.x, ball.y - ball.radius, "-5🧲", "#FF00FF"));

                        // Efecto visual de daño por imán
                        for (let k = 0; k < 2; k++) {
                            particles.push(new Particle(ball.x, ball.y, "#FF00FF"));
                        }
                    }
                }

                // Aplicar velocidad aumentada
                if (ball.isSpeedBoosted) {
                    let speedMultiplier = 3; // 3x más rápido
                    ball.vx *= speedMultiplier;
                    ball.vy *= speedMultiplier;
                }

                // Aplicar congelación y daño por segundo
                if (ball.isFrozen) {
                    // Detener movimiento
                    ball.vx = 0;
                    ball.vy = 0;

                    // Aplicar 1 daño cada segundo
                    if (Date.now() - ball.freezeDamageTimer >= 1000) {
                        ball.takeDamage();
                        ball.freezeDamageTimer = Date.now();
                        texts.push(new FloatingText(ball.x, ball.y - ball.radius, "-1❄️", "#00FFFF"));

                        // Efecto visual de daño por hielo
                        for (let k = 0; k < 2; k++) {
                            particles.push(new Particle(ball.x, ball.y, "#00FFFF"));
                        }
                    }
                }
            });

            resolveCollisions();

            // Filtrar Muertos y Spawmear Explosión
            for (let i = balls.length - 1; i >= 0; i--) {
                if (balls[i].life <= 0) {

                    // Sumar kill al atacante global
                    if (balls[i].lastAttackerId && globalPlayerStats[balls[i].lastAttackerId]) {
                        globalPlayerStats[balls[i].lastAttackerId].kills++;
                    }

                    spawnExplosion(balls[i].x, balls[i].y, balls[i].color);
                    deadSound.cloneNode(true).play().catch(e => console.log(e));
                    balls.splice(i, 1);
                }
            }

            balls.forEach(b => b.draw());

            // Textos Flotantes
            for (let i = texts.length - 1; i >= 0; i--) {
                let t = texts[i];
                t.update();
                if (t.life <= 0) texts.splice(i, 1);
                else t.draw();
            }

            // Partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                if (p.life <= 0) particles.splice(i, 1);
                else p.draw();
            }

            // Láseres (Rayos)
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.update();
                l.draw(); // Draw over everything? O under balls? Over se ve mejor.
                if (l.life <= 0) lasers.splice(i, 1);
            }

            requestAnimationFrame(loop);
        }
        loop();

        // Make Draggable
        function makeDraggable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

                    sender.heal(100);

                    // Función para disparar una ráfaga (test)
                    const fireLaserWaveTest = (waveIndex) => {
                        let currentSender = balls.find(b => b.uniqueId === sender.uniqueId);
                        if (!currentSender && waveIndex > 0) return;

                        if (waveIndex > 0) {
                            laserSound.cloneNode(true).play().catch(e => console.log(e));
                        }

                        let rivals = balls.filter(b => (currentSender ? b.uniqueId !== currentSender.uniqueId : true));
                        let targets = [];
                        let availableTargets = [...rivals];

                        for (let i = 0; i < Math.min(8, availableTargets.length); i++) {
                            let randIndex = Math.floor(Math.random() * availableTargets.length);
                            targets.push(availableTargets[randIndex]);
                            availableTargets.splice(randIndex, 1);
                        }

                        targets.forEach(target => {
                            let currSender = currentSender || sender;
                            let currentTarget = balls.find(b => b.uniqueId === target.uniqueId);

                            if (currSender && currentTarget) {
                                let angle = Math.atan2(currentTarget.y - currSender.y, currentTarget.x - currSender.x);
                                lasers.push(new Laser(currSender.x, currSender.y, angle, currSender.uniqueId));

                                if (!currentTarget.hasShield) {
                                    let damageAmount = Math.floor(currentTarget.life * 0.10);
                                    currentTarget.forceDamage(damageAmount);
                                    currentTarget.lastAttackerId = currSender.uniqueId;
                                }

                                for (let k = 0; k < 5; k++) {
                                    particles.push(new Particle(currentTarget.x, currentTarget.y, "#FF0000"));
                                }
                            }
                        });
                        
                        if (waveIndex === 0) {
                            texts.push(new FloatingText(sender.x, sender.y - sender.radius, "¡LÁSER MASIVO X3!", "#FF0000"));
                            texts.push(new FloatingText(sender.x, sender.y - sender.radius - 25, `Objetivos: ${targets.length}`, "#FF3333"));
                        }
                    };

                    fireLaserWaveTest(0);
                    setTimeout(() => fireLaserWaveTest(1), 500);
                    setTimeout(() => fireLaserWaveTest(2), 1000);
                }
            }

            // Tecla '8' lanzará el gift 7168 (BOMBA GALAXY) a un país elegido al azar
            if (e.key === "8") {
                if (balls.length > 0) {
                    let randomIndex = Math.floor(Math.random() * balls.length);
                    let sender = balls[randomIndex];

                    let wipeoutAudio = wipeoutSound.cloneNode(true);
                    wipeoutAudio.play().catch(e => console.log(e));

                    wipeoutAudio.onended = () => {
                        galaxySound.cloneNode(true).play().catch(e => console.log(e));
                    };

                    // ---- OTORGAR TODOS LOS PODERES AL CREADOR POR 20s ----
                    sender.hasShield = true;
                    sender.shieldEndTime = Date.now() + 20000;
                    sender.shieldAnimationTime = 0;

                    sender.isPowered = true;
                    sender.powerEndTime = Date.now() + 20000;
                    sender.damageMultiplier = 3;

                    sender.spikeCount = 7;
                    sender.spikeType = "fire";

                    sender.isSpeedBoosted = true;

                    // Remover spikes y velocidad después de 20s
                    setTimeout(() => {
                        let currentSender = balls.find(b => b.uniqueId === sender.uniqueId);
                        if (currentSender) {
                            currentSender.isSpeedBoosted = false;
                            currentSender.spikeCount = 0;
                        }
                    }, 20000);

                    let rivals = balls.filter(b => b.uniqueId !== sender.uniqueId);
                    let killedCount = 0;

                    rivals.forEach(target => {
                        if (!target.hasShield) {
                            target.life = 0;
                            target.lastAttackerId = sender.uniqueId;
                            killedCount++;

                            for (let i = 0; i < 40; i++) {
                                let p = new Particle(target.x, target.y, target.color);
                                p.size = Math.random() * 8 + 4;
                                p.decay = Math.random() * 0.01 + 0.005;
                                p.vx *= 2;
                                p.vy *= 2;
                                particles.push(p);

                                if (Math.random() > 0.5) {
                                    let pStar = new Particle(target.x, target.y, "#FFFFA0");
                                    pStar.decay = 0.005;
                                    particles.push(pStar);
                                }
                            }
                        }
                    });

                    texts.push(new FloatingText(sender.x, sender.y - sender.radius, "¡BOMBA GALAXY!", "#8A2BE2"));
                    texts.push(new FloatingText(sender.x, sender.y - sender.radius - 25, `Eliminados: ${killedCount}`, "#FF00FF"));
                }
            }

            // Tecla '9' lanzará el gift AURA DORADA (7934) a un país elegido al azar
            if (e.key === "9") {
                if (balls.length > 0) {
                    let randomIndex = Math.floor(Math.random() * balls.length);
                    let randomTarget = balls[randomIndex];

                    auraSound.cloneNode(true).play().catch(e => console.log(e));
                    
                    randomTarget.hasGoldenAura = true;
                    randomTarget.goldenAuraEndTime = Date.now() + 360000; // 6 minutos
                    
                    texts.push(new FloatingText(randomTarget.x, randomTarget.y - randomTarget.radius, "¡AURA SUPREMA!", "#FFD700"));
                    texts.push(new FloatingText(randomTarget.x, randomTarget.y - randomTarget.radius - 25, "6 Minutos de Resplandor", "#FFA500"));
                }
            }

        });

    </script>
